name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Ruff lint
        run: uv run ruff check .

  ruff-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Ruff format check
        run: uv run ruff format --check .

  ty-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Ty type check
        run: uv run ty check

  license-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Check license headers
        run: uv run python scripts/update_headers.py --check

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          # This is the ONLY place we pass a version, so it iterates through the matrix
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest -v --durations=0

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lock-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Check lockfile is up to date
        run: uv lock --check

  pytest-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Run tests
        run: uv run pytest -v --durations=0 -m 'not integration'

  pytest-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Run tests
        run: uv run pytest -v --durations=0 -m 'not integration'

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv

      - name: Build sdist and wheel
        run: uv build

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Verify wheel installs and imports
        run: |
          PACKAGE_NAME=$(uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              name = tomllib.load(f)['project']['name']
          print(name.replace('-', '_'))
          ")
          if [[ -z "$PACKAGE_NAME" ]]; then
            echo "::error::Failed to extract package name from pyproject.toml"
            exit 1
          fi
          uv venv /tmp/test-install
          VIRTUAL_ENV=/tmp/test-install uv pip install dist/*.whl
          /tmp/test-install/bin/python -c "import ${PACKAGE_NAME}; print(${PACKAGE_NAME}.__version__)"

  # Render the template and run the generated project's own checks.
  # Catches template-only breakage the package jobs above can't see.
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Oldest and newest supported minimums; a non-3.10 minimum
        # exercises the templated CI matrix and ruff target-version.
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Bake template
        run: |
          git config --global user.name "bake-bot"
          git config --global user.email "bake@example.com"
          # Long description regression test: must not break the
          # generated module docstring or the initial commit.
          uvx cookiecutter . --no-input --output-dir /tmp/bake \
            project_name=sample-project \
            project_description="A deliberately long project description that would overflow an eighty character line if the template failed to wrap it" \
            author_name="Bake Bot" \
            author_email="bake@example.com" \
            github_username="bake-bot" \
            python_version="${{ matrix.python-version }}"

      - name: Generated project has an initial commit
        working-directory: /tmp/bake/sample_project
        run: git log --oneline -1

      - name: Run generated project's checks
        working-directory: /tmp/bake/sample_project
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run python scripts/update_headers.py --check
          uv run ty check
          uv run pytest -v

  ci-pass:
    if: always()
    needs:
      - ruff-lint
      - ruff-format
      - ty-check
      - license-headers
      - pytest
      - coverage
      - lock-check
      - pytest-macos
      - pytest-windows
      - build
      - bake
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
